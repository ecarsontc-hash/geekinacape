  <title>Toby Carson · Geek in a Cape</title>
    <link rel="apple-touch-icon" sizes="180x180" href="https://geekinacape.com/assets/Geek%20in%20a%20Cape.png">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      position: fixed;
      inset: 0;
      background: #E6E6E6;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Source Sans 3', sans-serif;
      padding: 0 16px;
      overscroll-behavior: none;
    }

    .card {
      background: #ffffff;
      border-radius: 18px;
      max-width: 420px;
      width: 100%;
      overflow: hidden;
      box-shadow: 0 6px 32px rgba(0,0,0,0.13);
    }

    /* Header band */
    .card-header {
      background: #005500;
      padding: 20px 32px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .logo-wrap {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: #E6E6E6;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 14px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.18);
      overflow: hidden;
    }

    .logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .business-name {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 22px;
      color: #ffffff;
      letter-spacing: 0.02em;
      margin-bottom: 4px;
    }

    .advisor-badge {
      font-family: 'Source Sans 3', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #008001;
      background: #ffffff;
      border-radius: 20px;
      padding: 4px 14px;
      margin-top: 6px;
      display: inline-block;
    }

    /* Body */
    .card-body {
      padding: 16px 28px 14px;
    }

    .name {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 28px;
      color: #111111;
      line-height: 1.15;
      margin-bottom: 2px;
    }

    .role {
      font-family: 'Source Sans 3', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #AAAAAA;
      margin-bottom: 10px;
    }

    .tagline {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 15px;
      color: #575757;
      margin-bottom: 14px;
      line-height: 1.45;
    }

    /* Divider */
    .divider {
      height: 1px;
      background: #E6E6E6;
      margin: 0 0 16px 0;
    }

    /* Contact items */
    .contact-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 20px;
    }

    .contact-item a {
      display: flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
      color: #111111;
      transition: color 0.18s;
    }

    .contact-item a:hover .contact-label,
    .contact-item a:active .contact-label { color: #008001; }
    .contact-item a:hover .icon-wrap,
    .contact-item a:active .icon-wrap { background: #008001; }
    .contact-item a:hover .icon-wrap svg path,
    .contact-item a:hover .icon-wrap svg circle,
    .contact-item a:hover .icon-wrap svg rect,
    .contact-item a:active .icon-wrap svg path,
    .contact-item a:active .icon-wrap svg circle,
    .contact-item a:active .icon-wrap svg rect { fill: #ffffff; stroke: #ffffff; }

    .icon-wrap {
      width: 42px;
      height: 42px;
      min-width: 42px;
      border-radius: 50%;
      background: #E8F5E9;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.18s;
    }

    .icon-wrap svg { width: 18px; height: 18px; }

    .contact-text { display: flex; flex-direction: column; }
    .contact-type {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #AAAAAA;
      margin-bottom: 1px;
    }
    .contact-label {
      font-size: 15px;
      font-weight: 600;
      color: #111111;
      transition: color 0.18s;
      word-break: break-all;
    }

    /* Save to contacts button */
    .save-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 13px 20px;
      background: #008001;
      color: #ffffff;
      border: none;
      border-radius: 10px;
      font-family: 'Source Sans 3', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.18s;
      margin-bottom: 10px;
    }

    .save-btn:hover, .save-btn:active { background: #005500; }
    .save-btn svg { width: 18px; height: 18px; }

    /* Footer */
    .card-footer {
      background: #f7f7f7;
      border-top: 1px solid #E6E6E6;
      padding: 10px 32px;
      text-align: center;
    }

    .footer-text {
      font-size: 11px;
      color: #AAAAAA;
      font-style: italic;
    }
  </style>

  <script>
    function saveContact(e) {
      e.preventDefault();
      var img = document.getElementById('logo-img');
      var canvas = document.createElement('canvas');
      canvas.width = 240;
      canvas.height = 240;
      var ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, 240, 240);
      var photoB64 = canvas.toDataURL('image/jpeg', 0.85).replace('data:image/jpeg;base64,', '');

      // Fold photo base64 per vCard spec (75 chars per line, continuation with space)
      var prefix = 'PHOTO;ENCODING=b;TYPE=JPEG:';
      var folded = prefix + photoB64.substring(0, 75 - prefix.length);
      for (var i = 75 - prefix.length; i < photoB64.length; i += 74) {
        folded += '\r\n ' + photoB64.substring(i, i + 74);
      }

      var vcard = [
        'BEGIN:VCARD',
        'VERSION:3.0',
        'N:Carson;Toby;;;',
        'FN:Toby Carson',
        'ORG:Geek in a Cape',
        'TITLE:Trusted Technology Advisor',
        'TEL;TYPE=CELL:+447809363110',
        'EMAIL;TYPE=INTERNET:reachingout@geekinacape.com',
        'URL:https://geekinacape.com',
        'NOTE:Your tech superhero with the human touch',
        folded,
        'END:VCARD'
      ].join('\r\n');

      var blob = new Blob([vcard], { type: 'text/vcard' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'Toby-Carson-Geek-in-a-Cape.vcf';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
    }
  </script>
